<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg" />
		<link rel="alternate icon" href="%sveltekit.assets%/favicon.ico" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		
		<!-- Primary Meta Tags -->
		<meta name="title" content="Triangles Block Explorer - TRI Cryptocurrency" />
		<meta name="description" content="Real-time block explorer for Triangles (TRI) cryptocurrency. View blocks, transactions, network stats, staking info, and more." />
		<meta name="keywords" content="triangles, TRI, cryptocurrency, blockchain, block explorer, proof of stake, PoS" />
		<meta name="author" content="Triangles Community" />
		
		<!-- Open Graph / Facebook -->
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://blocks.cryptographic-triangles.org/" />
		<meta property="og:title" content="Triangles Block Explorer" />
		<meta property="og:description" content="Real-time block explorer for Triangles (TRI) cryptocurrency" />
		<meta property="og:image" content="https://blocks.cryptographic-triangles.org/og-image.png" />
		
		<!-- Twitter -->
		<meta property="twitter:card" content="summary_large_image" />
		<meta property="twitter:url" content="https://blocks.cryptographic-triangles.org/" />
		<meta property="twitter:title" content="Triangles Block Explorer" />
		<meta property="twitter:description" content="Real-time block explorer for Triangles (TRI) cryptocurrency" />
		<meta property="twitter:image" content="https://blocks.cryptographic-triangles.org/og-image.png" />
		
		<!-- Theme Color -->
		<meta name="theme-color" content="#dc2626" />
		
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
